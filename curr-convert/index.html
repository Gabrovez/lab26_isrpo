<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Конвертер валют</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h2>Конвертер валют</h2>

    <label for="amount">Сумма:</label>
    <input type="number" id="amount" placeholder="Введите сумму" step="0.01" min="0" />

    <label for="fromCurrency">Из валюты:</label>
    <select id="fromCurrency">
      <option value="USD">USD - Доллар США</option>
      <option value="EUR">EUR - Евро</option>
      <option value="RUB">RUB - Российский рубль</option>
      <option value="GBP">GBP - Британский фунт</option>
      <option value="JPY">JPY - Японская иена</option>
    </select>

    <label for="toCurrency">В валюту:</label>
    <select id="toCurrency">
      <option value="EUR">EUR - Евро</option>
      <option value="USD">USD - Доллар США</option>
      <option value="RUB">RUB - Российский рубль</option>
      <option value="GBP">GBP - Британский фунт</option>
      <option value="JPY">JPY - Японская иена</option>
    </select>

    <button id="convertBtn">Конвертировать</button>

    <p class="error" id="errorMessage"></p>
    <div id="result"></div>
  </div>

  <script src="main.js"></script>
</body>
</html>
